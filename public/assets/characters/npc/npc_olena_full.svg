<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 384">
  <!--
    OLENA — Guardian-Weaver of Lanchyn
    Neon Psychedelic Cyber-Folk style
    Colors: Orange #FF6B35 · Neon Pink #FF69B4 · Sun Yellow #FFE000
    Thick black outlines, flat neon fills, no gradients
  -->

  <!-- ── Outer aura rings ── -->
  <circle cx="128" cy="205" r="132" fill="none" stroke="#FFE000"  stroke-width="1.5" opacity="0.12"/>
  <circle cx="128" cy="205" r="114" fill="none" stroke="#FF6B35"  stroke-width="2"   opacity="0.18"/>
  <circle cx="128" cy="205" r="96"  fill="none" stroke="#FF69B4"  stroke-width="2.5" opacity="0.28"/>
  <circle cx="128" cy="205" r="78"  fill="none" stroke="#FFE000"  stroke-width="1.5" opacity="0.20"/>

  <!-- ── Sun Oberih (amulet) — floating upper right ── -->
  <g transform="translate(198,42)" opacity="0.95">
    <!-- Sun rays -->
    <line x1="20" y1="0"  x2="20" y2="7"  stroke="#FFE000" stroke-width="2.5"/>
    <line x1="20" y1="33" x2="20" y2="40" stroke="#FFE000" stroke-width="2.5"/>
    <line x1="0"  y1="20" x2="7"  y2="20" stroke="#FFE000" stroke-width="2.5"/>
    <line x1="33" y1="20" x2="40" y2="20" stroke="#FFE000" stroke-width="2.5"/>
    <line x1="5"  y1="5"  x2="10" y2="10" stroke="#FFE000" stroke-width="2"/>
    <line x1="35" y1="5"  x2="30" y2="10" stroke="#FFE000" stroke-width="2"/>
    <line x1="5"  y1="35" x2="10" y2="30" stroke="#FFE000" stroke-width="2"/>
    <line x1="35" y1="35" x2="30" y2="30" stroke="#FFE000" stroke-width="2"/>
    <!-- Sun disc glow -->
    <circle cx="20" cy="20" r="17" fill="none" stroke="#FFE000"  stroke-width="1.5" opacity="0.40"/>
    <!-- Sun disc -->
    <circle cx="20" cy="20" r="12" fill="#FFE000" stroke="#000" stroke-width="2.5"/>
    <circle cx="20" cy="20" r="7"  fill="#FF6B35" stroke="#000" stroke-width="2"/>
    <circle cx="17" cy="17" r="2.5" fill="#FFFFFF" opacity="0.80"/>
  </g>

  <!-- ── Skirt / folk dress lower ── -->
  <polygon points="84,248 172,248 185,370 71,370" fill="#FF6B35" stroke="#000" stroke-width="3"/>
  <!-- Skirt horizontal embroidery bands -->
  <rect x="77"  y="280" width="102" height="12" fill="#FFE000" stroke="#000" stroke-width="2"/>
  <!-- Band pattern (diamonds) -->
  <polygon points="85,282 91,286 85,290 79,286"  fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="99,282 105,286 99,290 93,286" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="113,282 119,286 113,290 107,286" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="127,282 133,286 127,290 121,286" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="141,282 147,286 141,290 135,286" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="155,282 161,286 155,290 149,286" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="168,282 172,286 168,290 164,286" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <!-- Second band -->
  <rect x="73"  y="325" width="110" height="12" fill="#FFE000" stroke="#000" stroke-width="2"/>
  <polygon points="80,327 86,331 80,335 74,331"   fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="96,327 102,331 96,335 90,331"  fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="112,327 118,331 112,335 106,331" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="128,327 134,331 128,335 122,331" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="144,327 150,331 144,335 138,331" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="160,327 166,331 160,335 154,331" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <polygon points="176,327 180,331 176,335 172,331" fill="#FF69B4" stroke="#000" stroke-width="1"/>

  <!-- ── Feet / shoes ── -->
  <ellipse cx="104" cy="368" rx="22" ry="10" fill="#1A1A1A" stroke="#000" stroke-width="3"/>
  <ellipse cx="152" cy="368" rx="22" ry="10" fill="#1A1A1A" stroke="#000" stroke-width="3"/>
  <!-- Shoe neon trim -->
  <ellipse cx="104" cy="365" rx="22" ry="5" fill="none" stroke="#FF69B4" stroke-width="2"/>
  <ellipse cx="152" cy="365" rx="22" ry="5" fill="none" stroke="#FF69B4" stroke-width="2"/>

  <!-- ── Belt / waist sash ── -->
  <rect x="93" y="244" width="70" height="10" rx="4" fill="#FFE000" stroke="#000" stroke-width="2"/>
  <!-- Sash knot -->
  <ellipse cx="128" cy="249" rx="10" ry="7" fill="#FF6B35" stroke="#000" stroke-width="2"/>

  <!-- ── Blouse (vyshyvanka top) ── -->
  <rect x="94" y="145" width="68" height="105" rx="5" fill="#FF69B4" stroke="#000" stroke-width="3"/>
  <!-- Top embroidery band (sun-yellow) -->
  <rect x="94" y="145" width="68" height="17" fill="#FFE000" stroke="#000" stroke-width="2"/>
  <!-- Floral embroidery on band -->
  <circle cx="103" cy="153" r="4" fill="#FF6B35" stroke="#000" stroke-width="1.5"/>
  <circle cx="115" cy="153" r="4" fill="#FF6B35" stroke="#000" stroke-width="1.5"/>
  <circle cx="127" cy="153" r="4" fill="#FF6B35" stroke="#000" stroke-width="1.5"/>
  <circle cx="139" cy="153" r="4" fill="#FF6B35" stroke="#000" stroke-width="1.5"/>
  <circle cx="151" cy="153" r="4" fill="#FF6B35" stroke="#000" stroke-width="1.5"/>
  <!-- Petal crosses around circles -->
  <line x1="103" y1="148" x2="103" y2="158" stroke="#FF6B35" stroke-width="1"/>
  <line x1="98"  y1="153" x2="108" y2="153" stroke="#FF6B35" stroke-width="1"/>
  <line x1="127" y1="148" x2="127" y2="158" stroke="#FF6B35" stroke-width="1"/>
  <line x1="122" y1="153" x2="132" y2="153" stroke="#FF6B35" stroke-width="1"/>
  <!-- Middle blouse stripe -->
  <rect x="94" y="218" width="68" height="10" fill="#FFE000" stroke="#000" stroke-width="2"/>
  <!-- Collar (round, decorated) -->
  <circle cx="128" cy="148" r="12" fill="#FF69B4" stroke="#000" stroke-width="2"/>
  <circle cx="128" cy="148" r="7"  fill="#FFE000" stroke="#000" stroke-width="2"/>

  <!-- ── Sun Amulet necklace ── -->
  <!-- Chain -->
  <path d="M116,160 Q128,172 140,160" fill="none" stroke="#FFE000" stroke-width="2"/>
  <!-- Pendant -->
  <circle cx="128" cy="174" r="10" fill="#FFE000" stroke="#000" stroke-width="2.5"/>
  <!-- Sun face in pendant -->
  <circle cx="128" cy="174" r="5"  fill="#FF6B35" stroke="#000" stroke-width="1.5"/>
  <!-- Mini rays -->
  <line x1="128" y1="163" x2="128" y2="167" stroke="#FFE000" stroke-width="1.5"/>
  <line x1="128" y1="181" x2="128" y2="185" stroke="#FFE000" stroke-width="1.5"/>
  <line x1="117" y1="174" x2="121" y2="174" stroke="#FFE000" stroke-width="1.5"/>
  <line x1="135" y1="174" x2="139" y2="174" stroke="#FFE000" stroke-width="1.5"/>
  <!-- Pendant glow -->
  <circle cx="128" cy="174" r="13" fill="none" stroke="#FFE000" stroke-width="1.5" opacity="0.45"/>

  <!-- ── Arms ── -->
  <!-- Left arm (slightly raised, graceful) -->
  <rect x="62"  y="150" width="35" height="17" rx="6" fill="#FF69B4" stroke="#000" stroke-width="3" transform="rotate(-15,79,158)"/>
  <rect x="52"  y="168" width="28" height="58" rx="8" fill="#FFCC88" stroke="#000" stroke-width="3" transform="rotate(-20,66,197)"/>
  <!-- Left hand -->
  <ellipse cx="53" cy="225" rx="13" ry="10" fill="#FFCC88" stroke="#000" stroke-width="2" transform="rotate(-20,53,225)"/>

  <!-- Right arm -->
  <rect x="159" y="150" width="35" height="17" rx="6" fill="#FF69B4" stroke="#000" stroke-width="3" transform="rotate(10,176,158)"/>
  <rect x="176" y="168" width="28" height="58" rx="8" fill="#FFCC88" stroke="#000" stroke-width="3" transform="rotate(8,190,197)"/>
  <!-- Right hand -->
  <ellipse cx="193" cy="227" rx="13" ry="10" fill="#FFCC88" stroke="#000" stroke-width="2" transform="rotate(8,193,227)"/>

  <!-- ── Head ── -->
  <ellipse cx="128" cy="98"  rx="37" ry="44" fill="#FFCC88" stroke="#000" stroke-width="3"/>

  <!-- ── Vinok (Ukrainian flower wreath headdress) ── -->
  <!-- Base wreath band -->
  <rect x="90" y="62" width="76" height="14" rx="6" fill="#00AA44" stroke="#000" stroke-width="3"/>
  <!-- Flowers in wreath -->
  <!-- Left sunflower -->
  <circle cx="100" cy="62" r="11" fill="#FFE000" stroke="#000" stroke-width="2"/>
  <circle cx="100" cy="62" r="6"  fill="#8B4513" stroke="#000" stroke-width="1.5"/>
  <!-- Center flowers -->
  <circle cx="118" cy="58" r="9"  fill="#FF69B4" stroke="#000" stroke-width="2"/>
  <circle cx="118" cy="58" r="5"  fill="#FFE000" stroke="#000" stroke-width="1.5"/>
  <circle cx="128" cy="56" r="10" fill="#FF6B35" stroke="#000" stroke-width="2"/>
  <circle cx="128" cy="56" r="5"  fill="#FFE000" stroke="#000" stroke-width="1.5"/>
  <circle cx="138" cy="58" r="9"  fill="#FF69B4" stroke="#000" stroke-width="2"/>
  <circle cx="138" cy="58" r="5"  fill="#FFE000" stroke="#000" stroke-width="1.5"/>
  <!-- Right sunflower -->
  <circle cx="156" cy="62" r="11" fill="#FFE000" stroke="#000" stroke-width="2"/>
  <circle cx="156" cy="62" r="6"  fill="#8B4513" stroke="#000" stroke-width="1.5"/>
  <!-- Ribbon streamers -->
  <path d="M90,70 Q75,90 72,120"  fill="none" stroke="#FF69B4" stroke-width="3" stroke-linecap="round"/>
  <path d="M166,70 Q181,90 184,120" fill="none" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
  <path d="M72,120 Q70,135 78,148" fill="none" stroke="#FF69B4" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M184,120 Q186,135 178,148" fill="none" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Hair (flowing, warm brown) -->
  <path d="M90,78 Q78,105 80,145 Q86,155 90,145 Q88,110 92,82 Z" fill="#4A2800" stroke="#000" stroke-width="2"/>
  <path d="M166,78 Q178,105 176,145 Q170,155 166,145 Q168,110 164,82 Z" fill="#4A2800" stroke="#000" stroke-width="2"/>

  <!-- Eyebrows (elegant, arched) -->
  <path d="M107,84 Q116,80 121,83" fill="none" stroke="#4A2800" stroke-width="3" stroke-linecap="round"/>
  <path d="M135,83 Q140,80 149,84" fill="none" stroke="#4A2800" stroke-width="3" stroke-linecap="round"/>

  <!-- Eyes (large, warm orange, elegant) -->
  <ellipse cx="114" cy="100" rx="10" ry="12" fill="#FF6B35" stroke="#000" stroke-width="2"/>
  <ellipse cx="142" cy="100" rx="10" ry="12" fill="#FF6B35" stroke="#000" stroke-width="2"/>
  <ellipse cx="114" cy="100" rx="6"  ry="8"  fill="#3D1500"/>
  <ellipse cx="142" cy="100" rx="6"  ry="8"  fill="#3D1500"/>
  <circle  cx="117" cy="96"  r="2.5" fill="#FFFFFF" opacity="0.9"/>
  <circle  cx="145" cy="96"  r="2.5" fill="#FFFFFF" opacity="0.9"/>
  <!-- Eyelashes (simple lines) -->
  <line x1="105" y1="93" x2="108" y2="90" stroke="#000" stroke-width="1.5"/>
  <line x1="114" y1="89" x2="114" y2="86" stroke="#000" stroke-width="1.5"/>
  <line x1="123" y1="93" x2="120" y2="90" stroke="#000" stroke-width="1.5"/>
  <line x1="133" y1="93" x2="136" y2="90" stroke="#000" stroke-width="1.5"/>
  <line x1="142" y1="89" x2="142" y2="86" stroke="#000" stroke-width="1.5"/>
  <line x1="151" y1="93" x2="148" y2="90" stroke="#000" stroke-width="1.5"/>
  <!-- Eye glow -->
  <ellipse cx="114" cy="100" rx="12" ry="14" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.45"/>
  <ellipse cx="142" cy="100" rx="12" ry="14" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.45"/>

  <!-- Nose -->
  <path d="M124 113 Q128 120 132 113" fill="none" stroke="#CC9966" stroke-width="2"/>

  <!-- Smile (warm, kind) -->
  <path d="M115 126 Q128 137 141 126" fill="none" stroke="#CC6644" stroke-width="3" stroke-linecap="round"/>
  <!-- Cheek blush -->
  <ellipse cx="105" cy="115" rx="10" ry="7" fill="#FF69B4" opacity="0.35"/>
  <ellipse cx="151" cy="115" rx="10" ry="7" fill="#FF69B4" opacity="0.35"/>

  <!-- ── Floating sun symbols ── -->
  <!-- Small sun — lower left -->
  <g transform="translate(20,280)" opacity="0.85">
    <circle cx="16" cy="16" r="11" fill="#FFE000" stroke="#000" stroke-width="2"/>
    <circle cx="16" cy="16" r="6"  fill="#FF6B35" stroke="#000" stroke-width="1.5"/>
    <line x1="16" y1="2"  x2="16" y2="7"  stroke="#FFE000" stroke-width="2"/>
    <line x1="16" y1="25" x2="16" y2="30" stroke="#FFE000" stroke-width="2"/>
    <line x1="2"  y1="16" x2="7"  y2="16" stroke="#FFE000" stroke-width="2"/>
    <line x1="25" y1="16" x2="30" y2="16" stroke="#FFE000" stroke-width="2"/>
    <line x1="5"  y1="5"  x2="9"  y2="9"  stroke="#FFE000" stroke-width="1.5"/>
    <line x1="27" y1="5"  x2="23" y2="9"  stroke="#FFE000" stroke-width="1.5"/>
    <line x1="5"  y1="27" x2="9"  y2="23" stroke="#FFE000" stroke-width="1.5"/>
    <line x1="27" y1="27" x2="23" y2="23" stroke="#FFE000" stroke-width="1.5"/>
    <circle cx="16" cy="16" r="15" fill="none" stroke="#FFE000" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Floating petal/flower — right side -->
  <g transform="translate(210,175)" opacity="0.85">
    <circle cx="14" cy="14" r="9"  fill="#FF69B4" stroke="#000" stroke-width="2"/>
    <circle cx="14" cy="14" r="4"  fill="#FFE000" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="14" cy="3"  rx="5" ry="8" fill="#FF69B4" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="14" cy="25" rx="5" ry="8" fill="#FF69B4" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="3"  cy="14" rx="8" ry="5" fill="#FF69B4" stroke="#000" stroke-width="1.5"/>
    <ellipse cx="25" cy="14" rx="8" ry="5" fill="#FF69B4" stroke="#000" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="14" fill="none" stroke="#FF69B4" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Floating sparkles -->
  <circle cx="38"  cy="110" r="3" fill="#FFE000" stroke="#000" stroke-width="1"/>
  <circle cx="218" cy="265" r="2.5" fill="#FF69B4" stroke="#000" stroke-width="1"/>
  <circle cx="225" cy="140" r="2" fill="#FF6B35" stroke="#000" stroke-width="1"/>
  <circle cx="32"  cy="335" r="2.5" fill="#FFE000" stroke="#000" stroke-width="1"/>
</svg>
