<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 384">
  <!--
    SERHIY — Guardian of Lanchyn
    Neon Psychedelic Cyber-Folk style
    Colors: Gold #FFD700 · Turquoise #00CED1 · Neon Pink #FF00FF
    Thick black outlines, flat neon fills, no gradients
  -->

  <!-- ── Outer aura rings ── -->
  <circle cx="128" cy="210" r="135" fill="none" stroke="#FFD700"  stroke-width="1.5" opacity="0.12"/>
  <circle cx="128" cy="210" r="118" fill="none" stroke="#00CED1"  stroke-width="2"   opacity="0.18"/>
  <circle cx="128" cy="210" r="100" fill="none" stroke="#FFD700"  stroke-width="2.5" opacity="0.28"/>
  <circle cx="128" cy="210" r="82"  fill="none" stroke="#FF00FF"  stroke-width="1.5" opacity="0.20"/>

  <!-- ── Staff ── -->
  <rect x="196" y="38" width="11" height="305" rx="4" fill="#7B3A10" stroke="#000" stroke-width="3"/>
  <!-- Staff decorative rings -->
  <rect x="191" y="145" width="21" height="9"  rx="3" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <rect x="191" y="200" width="21" height="9"  rx="3" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <!-- Staff orb glow aura -->
  <circle cx="201" cy="32" r="30" fill="none" stroke="#00CED1" stroke-width="1.5" opacity="0.25"/>
  <circle cx="201" cy="32" r="22" fill="none" stroke="#00CED1" stroke-width="2"   opacity="0.40"/>
  <!-- Staff orb -->
  <circle cx="201" cy="32" r="17" fill="#00CED1" stroke="#000" stroke-width="3"/>
  <circle cx="201" cy="32" r="10" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <circle cx="197" cy="28" r="3"  fill="#FFFFFF" opacity="0.85"/>

  <!-- ── Legs / boots ── -->
  <!-- Left leg -->
  <rect x="97"  y="248" width="29" height="105" rx="5" fill="#0D005C" stroke="#000" stroke-width="3"/>
  <!-- Right leg -->
  <rect x="130" y="248" width="29" height="105" rx="5" fill="#0D005C" stroke="#000" stroke-width="3"/>
  <!-- Left boot -->
  <rect x="91"  y="332" width="42" height="28"  rx="7" fill="#1A1A1A" stroke="#000" stroke-width="3"/>
  <!-- Right boot -->
  <rect x="124" y="332" width="42" height="28"  rx="7" fill="#1A1A1A" stroke="#000" stroke-width="3"/>
  <!-- Boot neon trim -->
  <rect x="91"  y="332" width="42" height="6"   rx="3" fill="#00CED1" stroke="#000" stroke-width="1"/>
  <rect x="124" y="332" width="42" height="6"   rx="3" fill="#00CED1" stroke="#000" stroke-width="1"/>

  <!-- ── Belt ── -->
  <rect x="94" y="244" width="68" height="12" rx="4" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <!-- Belt buckle -->
  <rect x="121" y="243" width="14" height="14" rx="2" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <rect x="124" y="246" width="8"  height="8"  rx="1" fill="#FFD700"/>

  <!-- ── Vyshyvanka (embroidered shirt) ── -->
  <!-- Main body -->
  <rect x="94" y="148" width="68" height="100" rx="4" fill="#00CED1" stroke="#000" stroke-width="3"/>
  <!-- Top embroidery band (gold) -->
  <rect x="94" y="148" width="68" height="18"  fill="#FFD700" stroke="#000" stroke-width="2"/>
  <!-- Embroidery cross-pattern on band -->
  <rect x="100" y="151" width="5" height="12" rx="1" fill="#FF00FF" stroke="#000" stroke-width="1"/>
  <rect x="114" y="151" width="5" height="12" rx="1" fill="#FF00FF" stroke="#000" stroke-width="1"/>
  <rect x="128" y="151" width="5" height="12" rx="1" fill="#FF00FF" stroke="#000" stroke-width="1"/>
  <rect x="142" y="151" width="5" height="12" rx="1" fill="#FF00FF" stroke="#000" stroke-width="1"/>
  <rect x="151" y="151" width="5" height="12" rx="1" fill="#FF00FF" stroke="#000" stroke-width="1"/>
  <!-- Horizontal cross bars on embroidery -->
  <rect x="98"  y="156" width="62" height="3" fill="#FF00FF" opacity="0.5"/>
  <!-- Middle embroidery stripe -->
  <rect x="94" y="215" width="68" height="11" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <rect x="100" y="217" width="5" height="7"  rx="1" fill="#FF00FF" stroke="#000" stroke-width="1"/>
  <rect x="116" y="217" width="5" height="7"  rx="1" fill="#FF00FF" stroke="#000" stroke-width="1"/>
  <rect x="132" y="217" width="5" height="7"  rx="1" fill="#FF00FF" stroke="#000" stroke-width="1"/>
  <rect x="148" y="217" width="5" height="7"  rx="1" fill="#FF00FF" stroke="#000" stroke-width="1"/>
  <!-- Collar V-shape -->
  <polygon points="120,148 128,163 136,148" fill="#00CED1" stroke="#000" stroke-width="2"/>
  <!-- Collar trim -->
  <line x1="120" y1="148" x2="128" y2="163" stroke="#FFD700" stroke-width="2"/>
  <line x1="136" y1="148" x2="128" y2="163" stroke="#FFD700" stroke-width="2"/>

  <!-- ── Arms ── -->
  <!-- Left arm (outstretched slightly) -->
  <rect x="61"  y="153" width="35" height="18" rx="6" fill="#00CED1" stroke="#000" stroke-width="3" transform="rotate(15,78,162)"/>
  <rect x="52"  y="173" width="28" height="58" rx="8" fill="#FFCC88" stroke="#000" stroke-width="3" transform="rotate(12,66,202)"/>
  <!-- Left hand -->
  <ellipse cx="59" cy="233" rx="13" ry="11" fill="#FFCC88" stroke="#000" stroke-width="2" transform="rotate(12,59,233)"/>

  <!-- Right arm (holding staff) -->
  <rect x="160" y="153" width="35" height="18" rx="6" fill="#00CED1" stroke="#000" stroke-width="3" transform="rotate(-10,177,162)"/>
  <rect x="175" y="170" width="28" height="68" rx="8" fill="#FFCC88" stroke="#000" stroke-width="3" transform="rotate(-5,189,204)"/>
  <!-- Right hand -->
  <ellipse cx="192" cy="241" rx="13" ry="11" fill="#FFCC88" stroke="#000" stroke-width="2" transform="rotate(-5,192,241)"/>

  <!-- ── Head ── -->
  <ellipse cx="128" cy="100" rx="38" ry="45" fill="#FFCC88" stroke="#000" stroke-width="3"/>

  <!-- Hair (kozak oseledets style) -->
  <ellipse cx="128" cy="62"  rx="40" ry="22" fill="#3D1C00" stroke="#000" stroke-width="3"/>
  <!-- Oseledets (kozak scalp lock) -->
  <ellipse cx="128" cy="57"  rx="9"  ry="20" fill="#3D1C00" stroke="#000" stroke-width="2"/>

  <!-- Eyebrows (bold) -->
  <rect x="108" y="86" width="18" height="5" rx="2" fill="#3D1C00" stroke="#000" stroke-width="1"/>
  <rect x="130" y="86" width="18" height="5" rx="2" fill="#3D1C00" stroke="#000" stroke-width="1"/>

  <!-- Eyes (turquoise, glowing) -->
  <ellipse cx="115" cy="100" rx="9" ry="11" fill="#00CED1" stroke="#000" stroke-width="2"/>
  <ellipse cx="141" cy="100" rx="9" ry="11" fill="#00CED1" stroke="#000" stroke-width="2"/>
  <ellipse cx="115" cy="100" rx="5" ry="7"  fill="#003333"/>
  <ellipse cx="141" cy="100" rx="5" ry="7"  fill="#003333"/>
  <circle  cx="118" cy="97"  r="2"  fill="#FFFFFF" opacity="0.9"/>
  <circle  cx="144" cy="97"  r="2"  fill="#FFFFFF" opacity="0.9"/>
  <!-- Neon eye glow -->
  <ellipse cx="115" cy="100" rx="11" ry="13" fill="none" stroke="#00CED1" stroke-width="1" opacity="0.5"/>
  <ellipse cx="141" cy="100" rx="11" ry="13" fill="none" stroke="#00CED1" stroke-width="1" opacity="0.5"/>

  <!-- Nose -->
  <path d="M124 112 Q128 120 132 112" fill="none" stroke="#CC9966" stroke-width="2"/>

  <!-- Kozak moustache -->
  <path d="M107 126 Q117 135 128 131 Q139 135 149 126" fill="none" stroke="#3D1C00" stroke-width="4"/>
  <path d="M107 126 Q112 128 117 125"  fill="none" stroke="#3D1C00" stroke-width="2"/>
  <path d="M149 126 Q144 128 139 125" fill="none" stroke="#3D1C00" stroke-width="2"/>

  <!-- ── Floating magic symbols ── -->
  <!-- Tryzub (trident) — upper left -->
  <g transform="translate(18,55)" opacity="0.90">
    <rect x="14" y="0"  width="4" height="35" rx="2" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
    <rect x="5"  y="0"  width="4" height="18" rx="2" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
    <rect x="23" y="0"  width="4" height="18" rx="2" fill="#FFD700" stroke="#000" stroke-width="1.5"/>
    <path d="M5,0 Q5,-6 9,-6 Q12,-3 16,0"  fill="none" stroke="#FFD700" stroke-width="2"/>
    <path d="M27,0 Q27,-6 23,-6 Q20,-3 16,0" fill="none" stroke="#FFD700" stroke-width="2"/>
    <rect x="8"  y="33" width="20" height="4" rx="2" fill="#FFD700" stroke="#000" stroke-width="1"/>
    <circle cx="16" cy="18" r="18" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Pysanka (Easter egg) — upper right area -->
  <g transform="translate(218,75)" opacity="0.85">
    <ellipse cx="15" cy="22" rx="12" ry="18" fill="none" stroke="#FF00FF" stroke-width="2"/>
    <ellipse cx="15" cy="22" rx="6"  ry="18" fill="none" stroke="#FF00FF" stroke-width="1.5"/>
    <line x1="3"  y1="22" x2="27" y2="22" stroke="#FF00FF" stroke-width="1.5"/>
    <line x1="15" y1="4"  x2="15" y2="40" stroke="#FF00FF" stroke-width="1.5"/>
    <circle cx="15" cy="22" r="14" fill="none" stroke="#FF00FF" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- Floating star/sol symbol — lower left -->
  <g transform="translate(20,280)" opacity="0.80">
    <circle cx="14" cy="14" r="10" fill="none" stroke="#FFD700" stroke-width="2"/>
    <line x1="14" y1="0"  x2="14" y2="28" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="0"  y1="14" x2="28" y2="14" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="4"  y1="4"  x2="24" y2="24" stroke="#FFD700" stroke-width="1.5"/>
    <line x1="24" y1="4"  x2="4"  y2="24" stroke="#FFD700" stroke-width="1.5"/>
  </g>
</svg>
